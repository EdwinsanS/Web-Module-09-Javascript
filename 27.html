<!DOCTYPE html>

	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Javascript 27</title>
</head>
<body>

<script>
function hello(kata, times) {
    for (var i = 1; i <= times; i++) {
        console.log(kata);
    }
}

var kata = prompt("Masukkan kata yang ingin ditampilkan:");
var jumlah = prompt("Ingin ditampilkan berapa kali?");

hello(kata, jumlah);
</script>

</body>
