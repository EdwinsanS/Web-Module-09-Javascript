<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Javascript 17</title>
</head>
<body>

<script>
	var total;
	var i;
	var num; 
	total = 0;
	i = 1;

	while (i <= 10) {
	    num = Number(prompt("Masukkan angka ke-" + i ));
	    total += num;
	    i++;
	}

	console.log("Total jumlah =", total);
</script>

</body>
</html>
