<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Javascript 30</title>
</head>
<body>

<script>
    var fruits = [];
    var input;

    for (var i = 0; ; i++) {
        input = prompt("Masukkan nama buah (ketik 'stop' untuk berhenti):");
        if (input === "stop") {
            break;
        }
        fruits[i] = input;
    }

    console.log("Daftar buah:");
    for (var j = 0; j < fruits.length; j++) {
        console.log(fruits[j]);
    }
</script>

</body>
</html>
