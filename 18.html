<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Javascript 18</title>
</head>
<body>

<script>
	var total = 0;
	var num;
	num = Number(prompt("Masukkan angka (-1 untuk berhenti):"));

	while (num != -1) {
		total += num;
		num = Number(prompt("Masukkan angka (-1 untuk berhenti):"));
	}

	console.log("Total jumlah =", total);
</script>

</body>
</html>
